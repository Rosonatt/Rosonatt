name: Generate Snake

on:
  schedule:
    # Roda automaticamente a cada 24 horas
    - cron: "0 0 * * *"
  # Permite rodar manualmente a qualquer momento
  workflow_dispatch:
  push:
    # Roda sempre que você fizer um push na branch main
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake SVG
        # Este é o robô que cria a imagem da cobra
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Output Branch
        # Salva o arquivo gerado em uma branch separada (output)
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}